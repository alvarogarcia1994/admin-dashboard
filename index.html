<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
        <title>Admin Dashboard | The Odin Project</title>
    </head>

    <body>
        <!-- Container-->
        <div class="container">

            <!-- Left side of Admin Dashboard-->
            <div class="left">

                <!-- Sidebar begin -->
                <aside class="sidebar">
                    <div class="logo">
                        <i class="fa-solid fa-table-columns"></i>
                        <h1>Dashboard</h1>
                    </div>

                    <!-- Items container -->
                    <div class="items">
                        <!-- Upper part -->
                        <ul class="ul-sidebar">
                            <li class="li-sidebar"><i class="fa-sharp fa-solid fa-house"></i> Home</li>
                            <li class="li-sidebar"><i class="fa-regular fa-address-card"></i> Profile</li>
                            <li class="li-sidebar"><i class="fa-solid fa-comment"></i> Messages</li>
                            <li class="li-sidebar"><i class="fa-solid fa-clock"></i> History</li>
                            <li class="li-sidebar"><i class="fa-solid fa-copy"></i> Tasks</li>
                            <li class="li-sidebar"><i class="fa-solid fa-users"></i> Communities</li>
                        </ul>

                        <!-- Bottom part -->
                        <ul class="ul-sidebar ul-bottom">
                            <li class="li-sidebar"><i class="fa-solid fa-gear"></i> Settings</li>
                            <li class="li-sidebar"><i class="fa-solid fa-question"></i> Support</li>
                            <li class="li-sidebar"><i class="fa-solid fa-shield"></i> Privacy</li>
                        </ul>
                    </div>
                </aside>
                
            <!-- End of left side -->
            </div>

            <!-- Right side of Admin Dashboard -->
            <div class="right">

                <!-- Header begin -->
                <header class="header">
                    <div class="search-row">
                        <div class="search-left">
                            <!-- Icon -->
                            <i class="fas fa-search"></i>
                            <input type="search" class="search-bar-input" name="search">
                        </div>
                        
                        <div class="search-right">
                            <!-- Bell -->
                            <i class="fa fa-bell"></i>

                            <!-- User profile-->
                            <div class="user-profile">
                                <!-- Icon user  -->
                                <div class="user-img-wrapper">
                                    <img src="assets/avatar.png">
                                </div>
                                <!-- User name-->
                                <h2>Morgan Oakley</h2>
                            </div>
            
                        </div>
                    </div>

                    <div class="user-logged">
                        <div class="user-img-wrapper">
                            <img src="assets/avatar.png">
                        </div>
                        <div class="user-text-wrapper">
                            <h5>Hi there,</h5>
                            <h2>Morgan Oakley (@morgan)</h2>
                        </div>
                        <div class="action-buttons">
                            <button type="button">New</button>
                            <button type="button">Upload</button>
                            <button type="button">Share</button>
                        </div>
                    </div>
                    
                    <!-- Header ends -->
                </header>
                

                <!-- Main content which cotanaines all the projects -->
                <main class="main-content">
                    
                </main>

            <!-- End right side -->
            </div>

        <!-- End of container -->
        </div>

    </body>
</html>
